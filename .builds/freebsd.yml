image: freebsd/latest

packages:
  - devel/gdb
  - devel/meson
  - devel/pkgconf
  - devel/jansson
  - devel/evdev-proto
  - graphics/wayland
  - graphics/libdrm
  - graphics/libjpeg-turbo
  - graphics/mesa-libs
  - x11/pixman
  - x11/libxkbcommon
  - multimedia/ffmpeg
  - security/gnutls
  # runtime deps for integration testing:
  - x11-wm/sway
  - textproc/jq
  - shells/bash
  - devel/py-pip
  - security/py-cryptography

sources:
  - http://github.com/any1/wayvnc
  - http://github.com/any1/neatvnc
  - http://github.com/any1/aml

tasks:
  - pip-vncdotool: |
      sudo pip install vncdotool
  - aml-build: |
      cd aml
      meson setup build --prefix=/usr --buildtype=debug
      ninja -C build
      sudo ninja -C build install
  - neatvnc-build: |
      cd neatvnc
      meson setup build --prefix=/usr --buildtype=debug -Dtests=true -Dexamples=true
      ninja -C build
      sudo ninja -C build install
  - wayvnc-build: |
      cd wayvnc
      meson setup build --prefix=/usr --buildtype=debug -Dtests=true
      ninja -C build
  - neatvnc-test: |
      cd neatvnc
      ninja -C build test
  - wayvnc-test: |
      cd wayvnc
      ninja -C build test
  - wayvnc-integration-test: |
      cd wayvnc
      ./test/integration/integration.sh
